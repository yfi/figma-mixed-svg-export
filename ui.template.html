<!DOCTYPE html>
<html>
<head>
<script>
/* SVGO:INLINE */
</script>
<script>
/* AVIF:INLINE */
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, system-ui, -apple-system, sans-serif;
    font-size: 12px;
    color: #333;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 100vh;
  }
  .header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  h2 { font-size: 14px; font-weight: 600; }
  .version { font-size: 10px; color: #aaa; font-variant-numeric: tabular-nums; }
  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label { font-weight: 500; color: #666; }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input[type="range"] { flex: 1; }
  .quality-val { font-variant-numeric: tabular-nums; min-width: 32px; }
  .segmented {
    display: flex;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    overflow: hidden;
    width: fit-content;
  }
  .segmented input { display: none; }
  .segmented label {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: #666;
    cursor: pointer;
    user-select: none;
  }
  .segmented label + label { border-left: 1px solid #e5e5e5; }
  .segmented input:checked + label {
    background: #18A0FB;
    color: white;
  }
  button {
    background: #18A0FB;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #0d8de5; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #status {
    padding: 8px 10px;
    background: #f5f5f5;
    border-radius: 6px;
    min-height: 36px;
    display: flex;
    align-items: center;
    color: #666;
    line-height: 1.4;
  }
  #stats {
    font-size: 11px;
    color: #999;
    display: none;
  }
  #stats.visible { display: block; }
  .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .stat-label { color: #888; }
  .stat-value { font-weight: 500; color: #333; }
  .savings { color: #1bc47d; font-weight: 600; }
</style>
</head>
<body>
  <div class="header">
    <h2>SVG Export with Optimized Bitmaps</h2>
    <span class="version">v1.3.0</span>
  </div>

  <div class="control">
    <label>Bitmap Resolution (relative to display size)</label>
    <div class="segmented">
      <input type="radio" name="factor" id="factor1" value="1" />
      <label for="factor1">1×</label>
      <input type="radio" name="factor" id="factor2" value="2" checked />
      <label for="factor2">2×</label>
      <input type="radio" name="factor" id="factor3" value="3" />
      <label for="factor3">3×</label>
      <input type="radio" name="factor" id="factor0" value="0" />
      <label for="factor0">Original</label>
    </div>
  </div>

  <div class="control">
    <label>Bitmap Format</label>
    <div class="segmented">
      <input type="radio" name="format" id="formatWebp" value="image/webp" checked />
      <label for="formatWebp">WebP</label>
      <input type="radio" name="format" id="formatAvif" value="image/avif" />
      <label for="formatAvif">AVIF</label>
      <input type="radio" name="format" id="formatJpeg" value="image/jpeg" />
      <label for="formatJpeg">JPEG</label>
    </div>
  </div>

  <div class="control">
    <label>Quality</label>
    <div class="slider-row">
      <input type="range" id="quality" min="0.1" max="1.0" step="0.05" value="0.75" />
      <span class="quality-val" id="qualityLabel">0.75</span>
    </div>
  </div>

  <div class="control">
    <label>Detail Level (SVGO precision)</label>
    <div class="segmented">
      <input type="radio" name="detail" id="detailAuto" value="auto" />
      <label for="detailAuto">Auto</label>
      <input type="radio" name="detail" id="detail1" value="1" checked />
      <label for="detail1">1</label>
      <input type="radio" name="detail" id="detail2" value="2" />
      <label for="detail2">2</label>
    </div>
  </div>

  <button id="exportBtn">Export Selection as SVG</button>

  <div id="status">Select a frame or group, then click Export.</div>

  <div id="stats">
    <div class="stat-row">
      <span class="stat-label">Original SVG size</span>
      <span class="stat-value" id="origSize">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">After recompression</span>
      <span class="stat-value" id="webpSize">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">After SVGO</span>
      <span class="stat-value" id="optSize">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Savings</span>
      <span class="stat-value savings" id="savings">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Images converted</span>
      <span class="stat-value" id="imgCount">—</span>
    </div>
  </div>

  <canvas id="canvas" style="display:none"></canvas>

<script>
  const qualitySlider = document.getElementById('quality');
  const qualityLabel = document.getElementById('qualityLabel');
  const exportBtn = document.getElementById('exportBtn');
  const statusEl = document.getElementById('status');
  const statsEl = document.getElementById('stats');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let pendingDetail = 'auto';

  // Defensive: ensure each radio group has exactly one selected option at
  // load. The HTML `checked` attribute is sometimes not honored when the
  // page loads in Figma's iframe with back-forward cache quirks.
  const DEFAULTS = { factor: '2', format: 'image/webp', detail: '1' };
  for (const [name, val] of Object.entries(DEFAULTS)) {
    const group = document.querySelectorAll(`input[name="${name}"]`);
    const anyChecked = Array.from(group).some(r => r.checked);
    if (!anyChecked) {
      const match = Array.from(group).find(r => r.value === val);
      if (match) match.checked = true;
    }
  }

  qualitySlider.oninput = () => {
    qualityLabel.textContent = qualitySlider.value;
  };

  exportBtn.onclick = () => {
    exportBtn.disabled = true;
    statusEl.textContent = 'Starting export...';
    statsEl.classList.remove('visible');
    pendingDetail = document.querySelector('input[name="detail"]:checked').value;
    const factor = parseFloat(document.querySelector('input[name="factor"]:checked').value);
    const format = document.querySelector('input[name="format"]:checked').value;
    parent.postMessage({
      pluginMessage: {
        type: 'export',
        quality: parseFloat(qualitySlider.value),
        factor: factor,
        format: format
      }
    }, '*');
  };

  onmessage = async (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'status') {
      statusEl.textContent = msg.message;
    } else if (msg.type === 'error') {
      statusEl.textContent = '⚠ ' + msg.message;
      exportBtn.disabled = false;
    } else if (msg.type === 'process') {
      await processAndDownload(msg);
    }
  };

  async function processAndDownload({ svgString, quality, factor, format, fileName }) {
    // Up-front format check — `canvas.toDataURL` silently returns PNG when
    // asked for a format the browser can't encode. Bail before doing any
    // work rather than producing a surprisingly huge "optimized" SVG.
    if (!canEncode(format)) {
      statusEl.textContent = `⚠ This browser can't encode ${format}. Pick WebP or JPEG.`;
      exportBtn.disabled = false;
      return;
    }
    const originalSize = new Blob([svgString]).size;

    // Parse SVG
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgString, 'image/svg+xml');
    const perr = doc.querySelector('parsererror');
    if (perr) {
      statusEl.textContent = '⚠ SVG parse error: ' + perr.textContent.slice(0, 120);
      exportBtn.disabled = false;
      return;
    }

    // Capture the root BEFORE mounting — once the element is moved into
    // document.body, doc.documentElement becomes null and every later
    // querySelector on it throws (which manifests as the UI "hanging"
    // with the button stuck disabled).
    const svgRoot = doc.documentElement;
    const imageEls = Array.from(svgRoot.querySelectorAll('image'));
    statusEl.textContent = `Recompressing ${imageEls.length} embedded image(s)...`;

    // Mount the parsed SVG off-screen so getBBox() works for display-size
    // measurement. We keep the hrefs pointing at the original (large)
    // pixel data while measuring — the browser only uses dimensions.
    const unmount = mountSvgForMeasure(svgRoot);

    // Any thrown error below will jump to the finally block, which always
    // unmounts and re-enables the export button so the UI never hangs.
    let replaced = 0;
    try {
    for (let i = 0; i < imageEls.length; i++) {
      const el = imageEls[i];
      const currentHref =
        el.getAttribute('href') ||
        el.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
      if (!currentHref || !currentHref.startsWith('data:')) continue;

      // Compute the display size via getBBox on the consumer element(s),
      // then target displaySize * factor. The native-resolution cap lives
      // inside recompressDataUri against img.naturalWidth/Height — the
      // <image> width/height attributes are a user-space display box
      // (often "1" for pattern fills) and can't be used for that.
      const display = measureMaxDisplaySize(svgRoot, el);

      let targetMax = 0; // 0 means "keep native"
      if (factor > 0 && display && display.w > 0 && display.h > 0) {
        targetMax = Math.ceil(Math.max(display.w, display.h) * factor);
      }

      const slow = format === 'image/avif' ? ' (AVIF is slow)' : '';
      statusEl.textContent = display
        ? `Image ${i + 1}/${imageEls.length}: display ${Math.round(display.w)}×${Math.round(display.h)} → ${targetMax || 'native'}px${slow}`
        : `Image ${i + 1}/${imageEls.length}: native (display size unknown)${slow}`;

      try {
        const beforeBytes = Math.floor(currentHref.length * 3 / 4);
        const result = await recompressDataUri(currentHref, quality, targetMax, format);
        const webpUri = result.dataUri;
        const afterBytes = Math.floor(webpUri.length * 3 / 4);
        const mime = webpUri.slice(5, webpUri.indexOf(';'));
        console.log(
          `img ${i + 1}: native=${result.naturalW}x${result.naturalH}, display=${display ? Math.round(display.w)+'x'+Math.round(display.h) : '?'}, target=${targetMax || 'native'}, out=${result.outW}x${result.outH}, ${mime}, ${formatBytes(beforeBytes)} -> ${formatBytes(afterBytes)}`
        );
        el.setAttribute('href', webpUri);
        el.removeAttributeNS('http://www.w3.org/1999/xlink', 'href');
        replaced++;
      } catch (e) {
        console.warn('Failed to recompress image', i, e);
      }
    }
    } catch (e) {
      console.error('processAndDownload failed:', e);
      statusEl.textContent = '⚠ Error: ' + (e && e.message ? e.message : String(e));
      exportBtn.disabled = false;
      throw e;
    } finally {
      try { unmount(); } catch (_) {}
    }

    const serializer = new XMLSerializer();
    const webpSvg = serializer.serializeToString(svgRoot);
    const webpSize = new Blob([webpSvg]).size;

    statusEl.textContent = 'Running SVGO...';
    const finalSvg = await runSvgo(webpSvg, pendingDetail);
    const optimizedSize = new Blob([finalSvg]).size;

    // Show stats
    document.getElementById('origSize').textContent = formatBytes(originalSize);
    document.getElementById('webpSize').textContent = formatBytes(webpSize);
    document.getElementById('optSize').textContent = formatBytes(optimizedSize);
    const pct = ((1 - optimizedSize / originalSize) * 100);
    document.getElementById('savings').textContent =
      pct > 0 ? `${pct.toFixed(1)}% smaller` : `${Math.abs(pct).toFixed(1)}% larger`;
    document.getElementById('imgCount').textContent = replaced;
    statsEl.classList.add('visible');

    // Trigger download
    const blob = new Blob([finalSvg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${fileName}.svg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    statusEl.textContent = `Done! Exported ${fileName}.svg (${replaced} image(s) optimized)`;
    exportBtn.disabled = false;
  }

  async function runSvgo(svgString, detail) {
    const optimize = window.__svgoOptimize;
    if (typeof optimize !== 'function') {
      statusEl.textContent = '⚠ SVGO bundle missing, skipping optimization.';
      return svgString;
    }
    const opts = {
      multipass: true,
      plugins: [
        { name: 'preset-default', params: { overrides: { removeViewBox: false } } },
      ],
    };
    if (detail !== 'auto') opts.floatPrecision = parseInt(detail, 10);
    try {
      return optimize(svgString, opts).data;
    } catch (e) {
      statusEl.textContent = '⚠ SVGO error, using un-optimized SVG: ' + e.message;
      return svgString;
    }
  }

  // Mount an SVG temporarily off-screen so we can use the native getBBox()
  // API. Returns a function to unmount it. We hide via visibility + size
  // 0 to avoid any flicker.
  function mountSvgForMeasure(svgElement) {
    const host = document.createElement('div');
    host.style.cssText =
      'position:absolute;left:-99999px;top:-99999px;width:0;height:0;overflow:hidden;visibility:hidden;';
    host.appendChild(svgElement);
    document.body.appendChild(host);
    return () => document.body.removeChild(host);
  }

  // Find every element that references this <image> via a <pattern>, and
  // return the largest bounding box among them (the biggest on-screen
  // instance). Uses getBBox() so weird Figma structures, transforms,
  // clips, and path consumers all Just Work.
  function measureMaxDisplaySize(svgRoot, imageEl) {
    const imgId = imageEl.getAttribute('id');
    if (!imgId) return null;

    // Collect all patterns whose <use> references this image
    const patterns = [];
    const allPatterns = svgRoot.querySelectorAll('pattern');
    for (const pattern of allPatterns) {
      const uses = pattern.querySelectorAll('use');
      for (const use of uses) {
        const href =
          use.getAttribute('href') ||
          use.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
        if (href === '#' + imgId) {
          patterns.push(pattern.getAttribute('id'));
          break;
        }
      }
    }

    let maxW = 0, maxH = 0, measured = 0;
    // For each referencing pattern, find all its consumers and getBBox() them
    for (const patId of patterns) {
      if (!patId) continue;
      const refUrl = 'url(#' + patId + ')';
      const all = svgRoot.querySelectorAll('*');
      for (const el of all) {
        const f = el.getAttribute('fill') || '';
        const s = el.getAttribute('stroke') || '';
        const style = el.getAttribute('style') || '';
        if (f !== refUrl && s !== refUrl && !style.includes(refUrl)) continue;
        try {
          const bb = el.getBBox();
          // getBBox() is in the element's own user space; multiply the four
          // corners through getCTM() so ancestor transforms (scale, rotate,
          // nested <g>) are included. Without this, a fill inside e.g.
          // <g transform="scale(3)"> measures at 1/3 its true rendered size
          // and the bitmap gets downsampled 3× too aggressively.
          const ctm = el.getCTM();
          if (!ctm) continue;
          const corners = [
            [bb.x,            bb.y],
            [bb.x + bb.width, bb.y],
            [bb.x,            bb.y + bb.height],
            [bb.x + bb.width, bb.y + bb.height],
          ];
          let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
          for (const [x, y] of corners) {
            const tx = ctm.a * x + ctm.c * y + ctm.e;
            const ty = ctm.b * x + ctm.d * y + ctm.f;
            if (tx < minX) minX = tx;
            if (tx > maxX) maxX = tx;
            if (ty < minY) minY = ty;
            if (ty > maxY) maxY = ty;
          }
          const w = maxX - minX;
          const h = maxY - minY;
          if (w > maxW) maxW = w;
          if (h > maxH) maxH = h;
          measured++;
        } catch (e) { /* off-screen nodes may throw */ }
      }
    }

    if (!measured || !maxW || !maxH) return null;
    return { w: maxW, h: maxH };
  }

  // Probe whether we can encode this mime. Cached because the answer
  // doesn't change for the life of the iframe.
  //
  // - AVIF: the canvas can't encode it in any shipping browser, so we
  //   delegate to the inlined @jsquash/avif WASM encoder — "supported"
  //   iff the encoder bundle is present on window.
  // - Other formats: ask the canvas directly, then verify the output
  //   mime, since toDataURL silently returns PNG when the format isn't
  //   supported.
  const encodeSupport = {};
  function canEncode(mime) {
    if (mime in encodeSupport) return encodeSupport[mime];
    if (mime === 'image/avif') {
      return encodeSupport[mime] = typeof window.__avifModuleFactory === 'function';
    }
    const probe = document.createElement('canvas');
    probe.width = probe.height = 1;
    const uri = probe.toDataURL(mime);
    return encodeSupport[mime] = uri.startsWith('data:' + mime);
  }

  // Lazy-init the AVIF WASM encoder. We pass the inlined base64 wasm as
  // Module.wasmBinary, and provide a no-op locateFile so the module skips
  // its internal URL construction (which would otherwise throw).
  let avifModulePromise = null;
  function getAvifModule() {
    if (avifModulePromise) return avifModulePromise;
    if (typeof window.__avifModuleFactory !== 'function') {
      return Promise.reject(new Error('AVIF encoder bundle is missing.'));
    }
    const b64 = window.__avifWasmB64 || '';
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    avifModulePromise = window.__avifModuleFactory({
      wasmBinary: bytes,
      locateFile: (name) => name,
    });
    // Drop the large base64 string once we've handed its bytes to the
    // wasm loader. The `bytes` Uint8Array is still held by the module.
    delete window.__avifWasmB64;
    return avifModulePromise;
  }

  async function encodeAvifFromImageData(imageData, quality) {
    const module = await getAvifModule();
    const out = module.encode(
      new Uint8Array(imageData.data.buffer),
      imageData.width,
      imageData.height,
      {
        quality: Math.max(1, Math.min(100, Math.round(quality * 100))),
        qualityAlpha: -1,
        denoiseLevel: 0,
        tileColsLog2: 0,
        tileRowsLog2: 0,
        speed: 6,
        subsample: 1,
        chromaDeltaQ: false,
        sharpness: 0,
        tune: 0,
        enableSharpYUV: false,
        bitDepth: 8,
        lossless: false,
      }
    );
    if (!out) throw new Error('AVIF encoding returned no output');
    return out;
  }

  function bytesToBase64(bytes) {
    let binary = '';
    const CHUNK = 8192;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    return btoa(binary);
  }

  // Decode the data URI, optionally downscale so the longest edge is at
  // most `maxDim` pixels (0 or larger-than-native = keep original), and
  // re-encode as the chosen format. Never upscales past the natural pixel
  // dimensions. JPEG has no alpha, so we fill the canvas with white first.
  function recompressDataUri(dataUri, quality, maxDim, format) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = async () => {
        try {
          const nW = img.naturalWidth;
          const nH = img.naturalHeight;
          let w = nW;
          let h = nH;
          if (maxDim > 0 && Math.max(w, h) > maxDim) {
            const s = maxDim / Math.max(w, h);
            w = Math.max(1, Math.round(w * s));
            h = Math.max(1, Math.round(h * s));
          }
          canvas.width = w;
          canvas.height = h;
          if (format === 'image/jpeg') {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
          } else {
            ctx.clearRect(0, 0, w, h);
          }
          ctx.drawImage(img, 0, 0, w, h);

          let outUri;
          if (format === 'image/avif') {
            // Canvas can't encode AVIF — route through the inlined
            // libaom encoder. Pixel buffer is RGBA, which matches what
            // the encoder expects.
            const imageData = ctx.getImageData(0, 0, w, h);
            const avifBytes = await encodeAvifFromImageData(imageData, quality);
            outUri = 'data:image/avif;base64,' + bytesToBase64(new Uint8Array(avifBytes));
          } else {
            outUri = canvas.toDataURL(format, quality);
            // Guard against silent PNG fallback for unsupported mimes.
            if (!outUri.startsWith('data:' + format)) {
              throw new Error(
                `Browser cannot encode ${format} (got ${outUri.slice(5, outUri.indexOf(';'))}).`
              );
            }
          }
          resolve({ dataUri: outUri, naturalW: nW, naturalH: nH, outW: w, outH: h });
        } catch (e) {
          reject(e);
        }
      };
      img.onerror = () => reject(new Error('Failed to decode embedded image'));
      img.src = dataUri;
    });
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }
</script>
</body>
</html>
